name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

env:
  APP_NAME: 天行键同步助手
  APP_VERSION: 1.0.0

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --windowed
          --onefile
          --name "${{ env.APP_NAME }}"
          --distpath dist-windows
          --workpath build-windows
          --add-data "config.example.json;."
          tray_app.py

      - name: Copy portable executable
        shell: pwsh
        run: Copy-Item "dist-windows\天行键同步助手.exe" "dist-windows\txjxSyncAssistant.exe" -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build setup installer
        shell: pwsh
        run: |
          $iss = @"
          #define MyAppName "天行键同步助手"
          #define MyAppVersion "${{ env.APP_VERSION }}"
          #define MyAppPublisher "Fusheng"
          #define MyAppExeName "天行键同步助手.exe"

          [Setup]
          AppId={{B4C71ED4-91B4-45AE-8749-F6B6567A5A0B}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\txjx Sync Assistant
          DefaultGroupName=txjx Sync Assistant
          DisableProgramGroupPage=yes
          OutputDir=.
          OutputBaseFilename=txjxSyncAssistant_${{ env.APP_VERSION }}_x64-setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "dist-windows\{#MyAppExeName}"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@
          $iss | Set-Content -Path installer.iss -Encoding UTF8
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: txjxSyncAssistant-windows-x64
          path: |
            txjxSyncAssistant_${{ env.APP_VERSION }}_x64-setup.exe
            dist-windows/txjxSyncAssistant.exe

  macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build app bundle
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --windowed
          --name "${{ env.APP_NAME }}"
          --distpath dist-macos
          --workpath build-macos
          --add-data "config.example.json:."
          tray_app.py

      - name: Build DMG
        run: |
          hdiutil create \
            -volname "天行键同步助手" \
            -srcfolder "dist-macos/天行键同步助手.app" \
            -ov \
            -format UDZO \
            "txjxSyncAssistant_${APP_VERSION}_x64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: txjxSyncAssistant-macos-x64
          path: txjxSyncAssistant_${{ env.APP_VERSION }}_x64.dmg

  linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libayatana-appindicator3-dev rpm

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --windowed
          --onefile
          --name "${{ env.APP_NAME }}"
          --distpath dist-linux
          --workpath build-linux
          --add-data "config.example.json:."
          tray_app.py

      - name: Build DEB
        run: |
          mkdir -p pkg-deb/DEBIAN
          mkdir -p pkg-deb/opt/txjx-sync-assistant
          mkdir -p pkg-deb/usr/share/applications
          install -m 755 "dist-linux/天行键同步助手" pkg-deb/opt/txjx-sync-assistant/txjxSyncAssistant
          cat > pkg-deb/DEBIAN/control <<EOF
          Package: txjx-sync-assistant
          Version: ${APP_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Fusheng <wzxmer@outlook.com>
          Description: txjx folder sync and zzc merge assistant.
          EOF
          cat > pkg-deb/usr/share/applications/txjx-sync-assistant.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=天行键同步助手
          Exec=/opt/txjx-sync-assistant/txjxSyncAssistant
          Terminal=false
          Categories=Utility;
          EOF
          dpkg-deb --build pkg-deb "txjxSyncAssistant_${APP_VERSION}_amd64.deb"

      - name: Build RPM
        run: |
          mkdir -p rpmroot/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpm-src/opt/txjx-sync-assistant
          mkdir -p rpm-src/usr/share/applications
          install -m 755 "dist-linux/天行键同步助手" rpm-src/opt/txjx-sync-assistant/txjxSyncAssistant
          cat > rpm-src/usr/share/applications/txjx-sync-assistant.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=天行键同步助手
          Exec=/opt/txjx-sync-assistant/txjxSyncAssistant
          Terminal=false
          Categories=Utility;
          EOF
          tar -czf rpmroot/SOURCES/txjx-sync-assistant-${APP_VERSION}.tar.gz -C rpm-src .
          cat > rpmroot/SPECS/txjx-sync-assistant.spec <<EOF
          Name: txjx-sync-assistant
          Version: ${APP_VERSION}
          Release: 1%{?dist}
          Summary: One-way desktop folder mirroring utility
          License: MIT
          BuildArch: x86_64
          Source0: txjx-sync-assistant-${APP_VERSION}.tar.gz

          %description
          txjx Sync Assistant is a desktop utility for folder mirroring and zzc merge.

          %prep
          mkdir -p %{_builddir}/txjx-sync-assistant-${APP_VERSION}
          tar -xzf %{SOURCE0} -C %{_builddir}/txjx-sync-assistant-${APP_VERSION}

          %install
          mkdir -p %{buildroot}
          cp -a %{_builddir}/txjx-sync-assistant-${APP_VERSION}/* %{buildroot}/

          %files
          /opt/txjx-sync-assistant/txjxSyncAssistant
          /usr/share/applications/txjx-sync-assistant.desktop
          EOF
          rpmbuild --define "_topdir $(pwd)/rpmroot" -bb rpmroot/SPECS/txjx-sync-assistant.spec
          cp rpmroot/RPMS/x86_64/txjx-sync-assistant-${APP_VERSION}-1*.rpm "txjxSyncAssistant_${APP_VERSION}_x86_64.rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: txjxSyncAssistant-linux-x64
          path: |
            txjxSyncAssistant_${{ env.APP_VERSION }}_amd64.deb
            txjxSyncAssistant_${{ env.APP_VERSION }}_x86_64.rpm

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
      - linux
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        run: find release-assets -type f -maxdepth 3 -print

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: |
            release-assets/txjxSyncAssistant-windows-x64/txjxSyncAssistant_${{ env.APP_VERSION }}_x64-setup.exe
            release-assets/txjxSyncAssistant-windows-x64/txjxSyncAssistant.exe
            release-assets/txjxSyncAssistant-macos-x64/txjxSyncAssistant_${{ env.APP_VERSION }}_x64.dmg
            release-assets/txjxSyncAssistant-linux-x64/txjxSyncAssistant_${{ env.APP_VERSION }}_amd64.deb
            release-assets/txjxSyncAssistant-linux-x64/txjxSyncAssistant_${{ env.APP_VERSION }}_x86_64.rpm
