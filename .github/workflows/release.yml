name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: FolderSyncMirror-windows-x64
            build: .\build_exe.ps1
            package: Compress-Archive -Path dist-onefile\FolderSyncMirror.exe -DestinationPath FolderSyncMirror-windows-x64.zip -Force
            asset: FolderSyncMirror-windows-x64.zip
          - name: macos-universal
            os: macos-latest
            artifact: FolderSyncMirror-macos
            build: bash build_mac.sh
            package: bash -lc "ditto -c -k --sequesterRsrc --keepParent dist-mac/FolderSyncMirror.app FolderSyncMirror-macos.zip"
            asset: FolderSyncMirror-macos.zip
          - name: linux-x64
            os: ubuntu-latest
            artifact: FolderSyncMirror-linux-x64
            build: bash build_linux.sh
            package: bash -lc "zip -j FolderSyncMirror-linux-x64.zip dist-linux/FolderSyncMirror"
            asset: FolderSyncMirror-linux-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libayatana-appindicator3-dev zip

      - name: Build
        shell: pwsh
        run: ${{ matrix.build }}

      - name: Package
        shell: pwsh
        run: ${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
